<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --bg-page: #f4f7fb;
            --bg-surface: #ffffff;
            --bg-surface-soft: #f7f9fc;
            --border-color: rgba(109, 130, 171, 0.18);
            --text-main: #17223b;
            --text-body: #52627d;
            --text-muted: #8592aa;
            --accent-primary: #3a57e8;
            --accent-secondary: #08b1ba;
            --danger: #d04f66;
            --shadow: 0 28px 60px rgba(15, 23, 42, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Poppins", "Noto Sans TC", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(58, 87, 232, 0.12), transparent 22%),
                radial-gradient(circle at bottom left, rgba(8, 177, 186, 0.1), transparent 28%),
                linear-gradient(135deg, #fbfdff 0%, #eef3fa 100%);
            color: var(--text-body);
            padding: 0;
            color-scheme: light;
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .login-shell {
            width: min(480px, 100%);
        }

        .login-card {
            position: relative;
            padding: 36px;
            border: 1px solid var(--border-color);
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 250, 255, 0.96));
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            inset: 0 auto auto 0;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(58, 87, 232, 0.16), transparent 70%);
            pointer-events: none;
        }

        .login-card h2 {
            position: relative;
            z-index: 1;
            margin: 0 0 24px;
            color: var(--text-main);
            font-size: 2.2rem;
            line-height: 1.08;
        }

        .subtitle {
            position: relative;
            z-index: 1;
            margin: -8px 0 24px;
            color: var(--text-body);
            line-height: 1.7;
        }

        .error-banner {
            position: relative;
            z-index: 1;
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(208, 79, 102, 0.24);
            background: rgba(208, 79, 102, 0.08);
            color: #b33753;
            font-size: 0.95rem;
        }

        .field {
            position: relative;
            z-index: 1;
            margin-bottom: 16px;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: #ffffff;
            color: var(--text-main);
            outline: none;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .field input::placeholder {
            color: var(--text-muted);
        }

        .field input:focus {
            border-color: rgba(58, 87, 232, 0.4);
            box-shadow: 0 0 0 4px rgba(58, 87, 232, 0.12);
        }

        .submit-button {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 14px 18px;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent-primary), #5c7cff);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 14px 30px rgba(58, 87, 232, 0.18);
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .submit-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(58, 87, 232, 0.2);
        }

        .submit-button:active {
            transform: translateY(0);
            filter: saturate(0.96);
        }

        .submit-button:disabled {
            background: #d8e0ef;
            color: #91a0b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        .contact-note {
            position: relative;
            z-index: 1;
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid rgba(109, 130, 171, 0.12);
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.8;
        }

        .contact-note strong {
            color: var(--text-main);
        }

        .contact-note a {
            color: #3550d8;
            text-decoration: none;
        }

        @media (max-width: 640px) {
            .page {
                padding: 16px;
            }

            .login-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="login-shell">
            <div class="login-card">
                <h2>Sign in to continue</h2>
                <p class="subtitle">Enter your account and password to access the dashboard.</p>

                {% if error_message %}
                <div class="error-banner">{{ error_message }}</div>
                {% endif %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="field">
                        <input
                            id="username"
                            type="text"
                            name="username"
                            placeholder="帳號"
                            value="{{ username or '' }}"
                            required
                        >
                    </div>

                    <div class="field">
                        <input
                            id="password"
                            type="password"
                            name="password"
                            placeholder="Password"
                            required
                        >
                    </div>

                    <button class="submit-button" type="submit">Sign In</button>
                </form>

                <div class="contact-note">
                    Need an account? Contact <strong>YShane11</strong><br>
                    Gmail:
                    <a href="mailto:jason20031006@gmail.com">jason20031006@gmail.com</a>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
